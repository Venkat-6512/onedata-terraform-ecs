name: Terraform — ECS Fargate Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Terraform Plan
  # Runs on: push, PR, manual plan/apply
  # Skips on: manual destroy
  # ─────────────────────────────────────────────
  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformPlan
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -no-color 2>&1 | tee plan-output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            tfplan
            plan-output.txt
          retention-days: 1

      - name: Plan summary
        run: |
          echo "## 📋 Terraform Plan — Resources to be CREATED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Review the above before approving the apply job**" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2: Terraform Apply
  # Runs AFTER plan — requires manual approval
  # Runs on: push to main only
  # ─────────────────────────────────────────────
  terraform-apply:
    name: 🚀 Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging     # ← manual approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformApply
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      # Uses the saved plan — no drift between plan and apply
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get outputs
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "**ALB DNS:** \`${ALB_DNS}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Test URL:** http://${ALB_DNS}/health" >> $GITHUB_STEP_SUMMARY
          echo "ALB DNS: ${ALB_DNS}"

      - name: Smoke test — curl ALB
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "Waiting for ALB to be ready..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${ALB_DNS}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Service is live!"
              curl -s "http://${ALB_DNS}/health" | jq .
              break
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 15s..."
            sleep 15
          done

  # ─────────────────────────────────────────────
  # JOB 3: Terraform Destroy Plan
  # Shows exactly what will be destroyed BEFORE destroying
  # Runs on: manual destroy trigger only
  # ─────────────────────────────────────────────
  terraform-destroy-plan:
    name: 🔍 Destroy Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformDestroyPlan
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      # -destroy flag generates a plan showing what will be deleted
      - name: Terraform Destroy Plan
        run: terraform plan -destroy -out=destroy-plan -no-color 2>&1 | tee destroy-plan-output.txt

      - name: Upload destroy plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-destroy-plan
          path: |
            destroy-plan
            destroy-plan-output.txt
          retention-days: 1

      - name: Destroy plan summary
        run: |
          echo "## 🔍 Terraform Destroy Plan — Resources to be DELETED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat destroy-plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Review the above carefully before approving destroy**" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 4: Terraform Destroy
  # Runs AFTER destroy plan — requires manual approval
  # Uses saved destroy plan — no surprises
  # ─────────────────────────────────────────────
  terraform-destroy:
    name: 💥 Terraform Destroy
    runs-on: ubuntu-latest
    needs: terraform-destroy-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: staging     # ← manual approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformDestroy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download destroy plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-destroy-plan

      # Uses the saved destroy plan — exactly what was reviewed
      - name: Terraform Destroy
        run: terraform apply -auto-approve destroy-plan

      - name: Destroy complete
        run: |
          echo "## 💥 Infrastructure Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "All AWS resources removed. Billing stopped." >> $GITHUB_STEP_SUMMARY
