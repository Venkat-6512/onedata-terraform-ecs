name: Terraform — ECS Fargate Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

# Required for OIDC token request
permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Terraform Plan
  # Runs on every push and PR
  # ─────────────────────────────────────────────
  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC — no static credentials needed
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformPlan
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -no-color 2>&1 | tee plan-output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            tfplan
            plan-output.txt
          retention-days: 1

      - name: Plan summary
        run: |
          echo "## 📋 Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -30 plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2: Terraform Apply
  # Only on push to main — pauses for approval
  # ─────────────────────────────────────────────
  terraform-apply:
    name: 🚀 Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformApply
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get outputs
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "**ALB DNS:** \`${ALB_DNS}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Test URL:** http://${ALB_DNS}/health" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "ALB DNS: ${ALB_DNS}"

      - name: Smoke test — curl ALB
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "Waiting for ALB to be ready..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${ALB_DNS}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Service is live!"
              curl -s "http://${ALB_DNS}/health" | jq .
              break
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 15s..."
            sleep 15
          done

  # ─────────────────────────────────────────────
  # JOB 3: Terraform Destroy
  # Manual trigger only — prevents accidental destroy
  # ─────────────────────────────────────────────
  terraform-destroy:
    name: 💥 Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformDestroy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Destroy complete
        run: |
          echo "## 💥 Infrastructure Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "All AWS resources have been removed. Billing stopped." >> $GITHUB_STEP_SUMMARY
